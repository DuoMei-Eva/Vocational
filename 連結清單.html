<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>連結清單</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        :root {
            --primary-color: #2c3e50;
            --secondary-color: #34495e;
            --border-color: #dcdde1;
            --bg-color: #f5f6fa;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            margin: 0;
            padding: 20px;
            background-color: var(--bg-color);
            color: var(--primary-color);
            display: flex;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 800px;
            background: #ffffff;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
        }

        h1 {
            font-size: 24px;
            margin-bottom: 20px;
            color: var(--primary-color);
            border-bottom: 2px solid var(--primary-color);
            padding-bottom: 10px;
        }

        .selector-group {
            margin-bottom: 25px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
        }

        select {
            width: 100%;
            padding: 10px;
            font-size: 16px;
            border: 1px solid var(--border-color);
            border-radius: 4px;
            background-color: #fff;
            outline: none;
        }

        select:focus {
            border-color: var(--primary-color);
        }

        .accordion-item {
            border: 1px solid var(--border-color);
            border-radius: 4px;
            margin-bottom: 10px;
            overflow: hidden;
            background: #fff;
        }

        .accordion-header {
            width: 100%;
            background: #f8f9fa;
            padding: 15px;
            text-align: left;
            border: none;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            outline: none;
            transition: background 0.2s;
        }

        .accordion-header:hover {
            background: #edf2f7;
        }

        .accordion-header::after {
            content: '+';
            font-size: 18px;
            font-weight: bold;
        }

        .accordion-item.active .accordion-header::after {
            content: '-';
        }

        .accordion-content {
            display: none;
            padding: 20px;
            border-top: 1px solid var(--border-color);
            background: #fff;
        }

        .accordion-item.active .accordion-content {
            display: block;
        }

        .content-flex {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
        }

        @media (min-width: 600px) {
            .content-flex {
                flex-direction: row;
                justify-content: space-around;
                align-items: center;
            }
        }

        .qrcode-container {
            padding: 10px;
            background: #fff;
            border: 1px solid var(--border-color);
            border-radius: 4px;
        }

        .link-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            width: 100%;
            max-width: 300px;
        }

        .url-text {
            word-break: break-all;
            font-size: 14px;
            color: #666;
            text-align: center;
        }

        .btn {
            display: inline-block;
            width: 100%;
            padding: 12px;
            background-color: var(--primary-color);
            color: white;
            text-align: center;
            text-decoration: none;
            border-radius: 4px;
            font-weight: 500;
            transition: background 0.2s;
            box-sizing: border-box;
        }

        .btn:hover {
            background-color: var(--secondary-color);
        }

        .message {
            color: #666;
            font-style: italic;
            text-align: center;
            padding: 20px;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>主要連結導覽</h1>
    
    <div class="selector-group">
        <label for="fileSelect">請選擇資料來源：</label>
        <select id="fileSelect">
            <option value="">-- 偵測檔案中... --</option>
        </select>
    </div>

    <div id="linksContainer">
        <div class="message">正在從 GitHub 載入檔案清單，請稍候。</div>
    </div>
</div>

<script>
    const fileSelect = document.getElementById('fileSelect');
    const linksContainer = document.getElementById('linksContainer');

    // 自動解析 GitHub Pages 的帳號與專案名稱
    function getGitHubRepoInfo() {
        const hostname = window.location.hostname;
        const pathname = window.location.pathname;

        // 判斷是否在 GitHub Pages 環境運行 (例如: username.github.io/repo-name/)
        if (hostname.endsWith('.github.io')) {
            const owner = hostname.split('.')[0];
            const repo = pathname.split('/')[1];
            return { owner, repo, isValid: true };
        }
        
        // 本地測試環境備用提示
        return { owner: '', repo: '', isValid: false };
    }

    // 初始化：向 GitHub API 請求檔案清單
    function initFileDetection() {
        const repoInfo = getGitHubRepoInfo();

        if (!repoInfo.isValid) {
            linksContainer.innerHTML = '<div class="message" style="color: #e67e22;">環境提示: 目前非 GitHub Pages 環境，無法自動偵測。請上傳至 GitHub Pages 測試。</div>';
            fileSelect.innerHTML = '<option value="">-- 本地環境無法自動偵測 --</option>';
            return;
        }

        // 建立 GitHub REST API 目錄請求網址
        const apiUrl = `https://api.github.com/repos/${repoInfo.owner}/${repoInfo.repo}/contents/`;

        fetch(apiUrl)
            .then(response => {
                if (!response.ok) {
                    throw new Error('無法取得 GitHub 目錄資料，請確認專案是否為公開儲存庫。');
                }
                return response.json();
            })
            .then(data => {
                // 篩選出同層級所有副檔名為 .txt 的檔案
                const txtFiles = data.filter(item => item.type === 'file' && item.name.endsWith('.txt'));
                
                renderSelectOptions(txtFiles);
            })
            .catch(error => {
                linksContainer.innerHTML = `<div class="message" style="color: red;">讀取失敗: ${error.message}</div>`;
                fileSelect.innerHTML = '<option value="">-- 載入失敗 --</option>';
            });
    }

    // 將偵測到的檔案放入下拉式選單
    function renderSelectOptions(files) {
        fileSelect.innerHTML = '';
        
        if (files.length === 0) {
            fileSelect.innerHTML = '<option value="">-- 未偵測到任何 .txt 檔案 --</option>';
            linksContainer.innerHTML = '<div class="message">找不到文字檔案，請確認同層級是否有 .txt 檔案。</div>';
            return;
        }

        const defaultOption = document.createElement('option');
        defaultOption.value = '';
        defaultOption.textContent = '-- 請選擇檔案 --';
        fileSelect.appendChild(defaultOption);

        files.forEach(file => {
            const option = document.createElement('option');
            option.value = file.name; // 使用檔名作為 value
            option.textContent = file.name;
            fileSelect.appendChild(option);
        });

        linksContainer.innerHTML = '<div class="message">請由上方選單選擇檔案以載入內容。</div>';
    }

    // 當選單變更時讀取檔案內容
    fileSelect.addEventListener('change', function() {
        const selectedFile = this.value;
        if (!selectedFile) {
            linksContainer.innerHTML = '<div class="message">請由上方選單選擇檔案以載入內容。</div>';
            return;
        }
        fetchFileData(selectedFile);
    });

    // 讀取點選的文字檔內容
    function fetchFileData(fileName) {
        linksContainer.innerHTML = '<div class="message">載入中...</div>';
        
        fetch(fileName)
            .then(response => {
                if (!response.ok) {
                    throw new Error('無法讀取檔案內容。');
                }
                return response.text();
            })
            .then(text => {
                parseAndRender(text);
            })
            .catch(error => {
                linksContainer.innerHTML = `<div class="message" style="color: red;">錯誤: ${error.message}</div>`;
            });
    }

    // 解析文字並產生摺疊內容與 QR Code (邏輯與前版本相同)
    function parseAndRender(text) {
        linksContainer.innerHTML = '';
        const lines = text.split(/\r?\n/);
        let hasContent = false;

        lines.forEach((line, index) => {
            if (!line.trim()) return;

            const colonIndex = line.indexOf(':');
            if (colonIndex === -1) return;

            const name = line.substring(0, colonIndex).trim();
            const url = line.substring(colonIndex + 1).trim();

            if (name && url) {
                hasContent = true;
                createAccordionItem(name, url, index);
            }
        });

        if (!hasContent) {
            linksContainer.innerHTML = '<div class="message">此檔案中無有效的名稱與連結資料。</div>';
        }
    }

    function createAccordionItem(name, url, index) {
        const itemDiv = document.createElement('div');
        itemDiv.className = 'accordion-item';

        const headerBtn = document.createElement('button');
        headerBtn.className = 'accordion-header';
        headerBtn.textContent = name;

        const contentDiv = document.createElement('div');
        contentDiv.className = 'accordion-content';

        const flexDiv = document.createElement('div');
        flexDiv.className = 'content-flex';

        const qrContainer = document.createElement('div');
        qrContainer.className = 'qrcode-container';
        const qrId = `qrcode-${index}`;
        qrContainer.id = qrId;

        const linkContainer = document.createElement('div');
        linkContainer.className = 'link-container';

        const urlText = document.createElement('div');
        urlText.className = 'url-text';
        urlText.textContent = url;

        const actionBtn = document.createElement('a');
        actionBtn.className = 'btn';
        actionBtn.href = url;
        actionBtn.target = '_blank';
        actionBtn.textContent = '前往連結';

        linkContainer.appendChild(urlText);
        linkContainer.appendChild(actionBtn);
        flexDiv.appendChild(qrContainer);
        flexDiv.appendChild(linkContainer);
        contentDiv.appendChild(flexDiv);
        itemDiv.appendChild(headerBtn);
        itemDiv.appendChild(contentDiv);
        linksContainer.appendChild(itemDiv);

        headerBtn.addEventListener('click', function() {
            const isActive = itemDiv.classList.contains('active');
            
            if (!isActive) {
                itemDiv.classList.add('active');
                if (qrContainer.innerHTML === '') {
                    new QRCode(document.getElementById(qrId), {
                        text: url,
                        width: 128,
                        height: 128,
                        colorDark: "#2c3e50",
                        colorLight: "#ffffff",
                        correctLevel: QRCode.CorrectLevel.H
                    });
                }
            } else {
                itemDiv.classList.remove('active');
            }
        });
    }

    window.onload = initFileDetection;
</script>

</body>
</html>
